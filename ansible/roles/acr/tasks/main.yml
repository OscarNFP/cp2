---
# tasks file for roles/acr
- name: Conectándo a ACR...
  containers.podman.podman_login:
    registry: "{{ acr_url }}"
    username: "{{ acr_user }}"
    password: "{{ acr_password }}"

- name: Descargando imágenes públicas de Docker Hub...
  containers.podman.podman_image:
    name: "{{ item.src }}"
    state: present
  loop: "{{ imagenes }}"

- name: Etiquetando las imágenes para ACR...
  containers.podman.podman_tag:
    image: "{{ item.src }}"
    target_names:
      - "{{ acr_url }}/{{ item.dst }}:{{ tag_imagen }}"
  loop: "{{ imagenes }}"

- name: Subiendo las imágenes al ACR...
  containers.podman.podman_image:
    name: "{{ acr_url }}/{{ item.dst }}:{{ tag_imagen }}"
    push: true
  loop: "{{ imagenes }}"



