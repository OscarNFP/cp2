# Este es el playbook principal. Sobre este playbook se van ejecutando
# tareas de los distintos roles existentes: ACR, VM, AKS
# Nótese que ACR y AKS se ejecutan en localhost, mientras
# que VM se ejecuta sobre un host almacenado en el inventario

---
- name: Configurar ACR
  hosts: localhost
  vars_files:
    - secrets.yml
  tasks:
    - name: Pull, tag and push de la imagen al ACR para su posterior uso en AKS
      include_role:
        name: acr

- name: Configuración de la VM y despliegue del servidor web
  hosts: vm
  vars_files:
    - secrets.yml
  tasks:
    - name: Configurar VM usando Podman y despliegue del servidor web
      include_role:
        name: vm

- name: Configuración de AKS y despliegue de la aplicación
  hosts: localhost
  vars_files:
    - secrets.yml
  tasks:
    - name: Despliegue a la infraestructura de AKS
      include_role:
        name: aks    
